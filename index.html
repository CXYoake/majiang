<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>红中麻将 | Daxiami</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="mahjong-app" aria-label="红中麻将">
      <section class="game-header" aria-label="游戏信息">
        <div>
          <p class="eyebrow">HTML5 Mahjong</p>
          <h1>红中麻将</h1>
        </div>
        <div class="round-stats" aria-label="局面状态" role="status" aria-live="polite">
          <span id="wallCount">牌墙 0</span>
          <span id="turnIndicator">准备开局</span>
        </div>
        <button class="ghost-button" id="newRoundButton" type="button">新开一局</button>
      </section>

      <section class="table-shell" aria-label="麻将桌">
        <div class="seat seat-top" id="seat-2" data-seat-index="2" data-seat-position="top"></div>
        <div class="seat seat-left" id="seat-3" data-seat-index="3" data-seat-position="left"></div>
        <div class="seat seat-right" id="seat-1" data-seat-index="1" data-seat-position="right"></div>

        <section class="table-center" aria-label="牌桌中央">
          <div class="discard-board" id="discardBoard" aria-label="弃牌区"></div>
          <div class="table-status" role="status" aria-live="polite">
            <strong id="statusTitle">准备开局</strong>
            <span id="statusText">点击“新开一局”开始。</span>
          </div>
        </section>

        <section class="player-zone" aria-label="你的区域">
          <div class="player-summary" id="seat-0" data-seat-index="0" data-seat-position="bottom" data-seat-role="human"></div>
          <div class="hand-row" id="playerHand" aria-label="你的手牌"></div>
          <div class="action-row" aria-label="操作按钮">
            <button class="primary-button" id="discardButton" type="button" disabled>打出</button>
            <button class="peng-button" id="pengButton" type="button" hidden>碰</button>
            <button class="gang-button" id="gangButton" type="button" hidden>杠</button>
            <button class="win-button" id="huButton" type="button" hidden>胡</button>
            <button class="ghost-button" id="passButton" type="button" hidden>过</button>
          </div>
          <div class="gang-choice-row" id="gangChoiceRow" aria-label="选择杠牌" hidden></div>
        </section>
      </section>

      <aside class="log-panel" aria-labelledby="actionLogTitle">
        <h2 id="actionLogTitle">最近动作</h2>
        <ol id="actionLog" aria-live="polite" aria-relevant="additions text"></ol>
      </aside>
    </main>

    <dialog class="result-dialog" id="resultDialog" aria-labelledby="resultTitle" aria-describedby="resultText">
      <div class="result-card">
        <h2 id="resultTitle">本局结束</h2>
        <p id="resultText"></p>
        <div class="score-list" id="scoreList"></div>
        <button class="primary-button" id="dialogNewRoundButton" type="button">再来一局</button>
      </div>
    </dialog>

    <script src="./script.js"></script>
  </body>
</html>
